name: Generate Profile Trophy

on:
  workflow_dispatch:
  schedule:
    - cron: "15 0 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output folder
        run: mkdir -p profile-summary-card-output/github_dark

      - name: Generate trophy SVG
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: M-Amir-Ash
          output_path: profile-summary-card-output/github_dark/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          theme: onedark

      - name: Commit trophy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile-summary-card-output/github_dark/trophy.svg

          if git diff --cached --quiet; then
            echo "No trophy changes"
          else
            git commit -m "Generate GitHub trophy"
            git push
          fi
